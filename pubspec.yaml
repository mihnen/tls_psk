name: tls_psk
description: >-
  TLS 1.3 pre-shared-key (PSK) client sockets for Dart and Flutter, with forward
  secrecy. A self-contained dart:ffi binding to a vendored, statically-built
  mbedTLS — no system OpenSSL required.
version: 0.1.0
repository: https://github.com/mihnen/tls_psk
issue_tracker: https://github.com/mihnen/tls_psk/issues
topics:
  - tls
  - psk
  - ffi
  - networking
  - security

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
